project:
  name: Rain Predictor
  author: Kurtis Nisbet

paths:
  #Core Directories
  data_dir: data
  notebooks_dir: notebooks
  src_dir: src
  models_dir: models
  reports_dir: reports

  #Data layers
  data_raw_dir: data/raw
  data_interim_dir: data/interim
  data_processed_dir: data/processed

  #Report outputs
  figures_dir: reports/figures
  tables_dir: reports/tables

files:
  # Input data
  raw_dataset: weatherAUS.csv

  # Cleaned and feature-ready data
  processed_dataset: weatherAUS_processed.parquet
  features_dataset: weatherAUS_features.parquet
  processed_dataset: rainfall_processed.parquet

  X_train: X_train.parquet
  X_val: X_val.parquet
  X_test: X_test.parquet
  y_train: y_train.parquet
  y_val: y_val.parquet
  y_test: y_test.parquet

  # Outputs
  metrics_table: reports/tables/metrics.csv
  confusion_matrix: reports/figures/confusion_matrix.png
  model_artifact: models/rain_model.pkl

reproducibility:
  random_seed: 42

split:
  method: time
  train_fraction: 0.7
  validation_fraction: 0.15
  test_fraction: 0.15

# ── Training: all hyperparameter grids live here ─────────────────────────────
# Set enabled: false to skip an algorithm entirely.
# Fixed params are passed to the constructor unchanged.
# Grid keys are iterated via cartesian product.
training:
  logistic_regression:
    enabled: true
    fixed:
      solver: saga
      max_iter: 8000
    grid:
      C: [0.1, 0.3, 1.0, 3.0, 10.0]
      class_weight: [null, "balanced"]   # null -> sklearn default (uniform)

  random_forest:
    enabled: true
    fixed:
      n_jobs: -1
    grid:
      n_estimators: [100, 200]
      max_depth: [null, 15]              # null -> grow full trees
      class_weight: ["balanced"]

  xgboost:
    enabled: true
    fixed:
      eval_metric: logloss
      verbosity: 0
    grid:
      n_estimators: [100, 200]
      max_depth: [3, 6]
      learning_rate: [0.1]
      scale_pos_weight: [3]              # ~ratio neg/pos to address class imbalance

# ── Evaluation settings ───────────────────────────────────────────────────────
evaluation:
  threshold: 0.5             # Default decision threshold applied during training
  selection_metric: roc_auc  # Primary metric for model selection
  cv_folds: 5                # TimeSeriesSplit folds on X_train; set to 0 to use single val split
  optimize_threshold: true   # Sweep threshold on val set to maximise F1